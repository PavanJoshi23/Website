services:
  - type: web
    name: portfolio-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: '["website-7mz4a8yfw-pavanjoshi2311-5255s-projects.vercel.app"]'
